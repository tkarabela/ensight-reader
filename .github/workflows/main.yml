# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        numpy-version: ["numpy"]
        include:
          - python-version: "3.9"
            numpy-version: "numpy~=1.22.0"
          - python-version: "3.10"
            numpy-version: "numpy~=1.22.0"
          - python-version: "3.11"
            numpy-version: "numpy~=1.22.0"
          - python-version: "3.12"
            numpy-version: "numpy~=1.26.0"
          - python-version: "3.13"
            numpy-version: "numpy~=1.26.0"
          - python-version: "3.14"
            numpy-version: "numpy~=1.26.0"
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.14"
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv sync --locked --all-extras --dev
          uv pip install "${{ matrix.numpy-version }}"
      - name: Typecheck with mypy
        run: |
            uv run mypy
            uv run mypy --strict --no-warn-unused-ignores ensightreader.py
      - name: Check with ruff
        run: |
          uv run ruff check
      - name: Test with pytest
        run: |
          uv run python -m pytest
      - name: Generate coverage report for ensightreader.py
        run: |
          uv run python -m pytest --cov=ensightreader --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          env_vars: OS,PYTHON
